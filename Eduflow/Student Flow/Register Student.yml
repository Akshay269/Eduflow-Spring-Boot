info:
  name: Register Student
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8080/api/auth/register
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "name": "Akshay Rahangdale",
          "email": "john@gmail.com",
          "password": "123456",
          "role": "STUDENT"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
